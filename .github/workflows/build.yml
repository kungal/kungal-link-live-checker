# Test → build image → push to GHCR → trigger a Dokploy redeploy.
# Mirrors kun-galgame-infra's build.yml (see that repo's docs/deploy/13-registry-ci.md).
# Single binary, so a single image (no build matrix).
name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write            # required to push to GHCR

concurrency:                 # a newer push on the same ref cancels the older run
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:                      # gate the build on green tests (incl. the iron-law guards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go test -race ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/kunmoe/kungal-link-live-checker:latest
            ghcr.io/kunmoe/kungal-link-live-checker:${{ github.sha }}
          cache-from: type=gha,scope=link-live-checker
          cache-to: type=gha,mode=max,scope=link-live-checker

  deploy:                    # once the image is pushed, tell Dokploy to pull + redeploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        env:                                                     # secret via env, quoted in run (injection-safe)
          WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK_LINKCHECKER }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DOKPLOY_WEBHOOK_LINKCHECKER not set — image pushed to GHCR, skipping redeploy trigger."
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
